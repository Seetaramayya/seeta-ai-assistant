apiVersion: v1
kind: ConfigMap
metadata:
  name: golem-nginx-config
  namespace: golem
data:
  nginx.conf: |
    client_max_body_size 1g;

    upstream registry-service {
        server golem-registry-service:8083 fail_timeout=0 max_fails=0;
    }

    upstream worker-service {
        server golem-worker-service:9005 fail_timeout=0 max_fails=0;
    }

    upstream debugging-service {
        server golem-debugging-service:8086 fail_timeout=0 max_fails=0;
    }

    server {
        listen 80;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        location ~ /v1/components/[^/]+/workers/[^/]+/connect$ {
            proxy_pass http://worker-service;
            proxy_http_version 1.1;
            proxy_set_header Upgrade "websocket";
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location ~ /v1/components/[^/]+/workers(.*)$ {
            proxy_pass http://worker-service;
        }

        location /v1/agents {
            proxy_pass http://worker-service;
        }

        location /v1/debugger {
            proxy_pass http://debugging-service;
            proxy_http_version 1.1;
            proxy_set_header Upgrade "websocket";
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location / {
            proxy_pass http://registry-service;
        }
    }
