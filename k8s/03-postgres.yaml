apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: golem
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:17
        env:
        - name: POSTGRES_DB
          value: golem_db
        - name: POSTGRES_USER
          value: golem_user
        - name: POSTGRES_PASSWORD
          value: golem_password
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
        readinessProbe:
          exec:
            command: ["pg_isready", "-U", "golem_user", "-d", "golem_db"]
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 10
        resources:
          requests:
            memory: 256Mi
            cpu: 100m
          limits:
            memory: 1Gi
      volumes:
      - name: data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: golem
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432
