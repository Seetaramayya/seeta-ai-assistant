apiVersion: apps/v1
kind: Deployment
metadata:
  name: golem-router
  namespace: golem
spec:
  replicas: 1
  selector:
    matchLabels:
      app: golem-router
  template:
    metadata:
      labels:
        app: golem-router
    spec:
      containers:
      - name: nginx
        image: nginx:1.29
        ports:
        - containerPort: 80
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: nginx.conf
        resources:
          requests:
            memory: 64Mi
            cpu: 50m
          limits:
            memory: 256Mi
      volumes:
      - name: nginx-config
        configMap:
          name: golem-nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: golem-router
  namespace: golem
spec:
  selector:
    app: golem-router
  ports:
  - name: http
    port: 80
    targetPort: 80
