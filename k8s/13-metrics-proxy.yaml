apiVersion: v1
kind: ConfigMap
metadata:
  name: metrics-proxy
  namespace: monitoring
data:
  server.py: |
    import json, urllib.request, ssl
    from http.server import HTTPServer, BaseHTTPRequestHandler

    URL = "https://seeta-ai-assistant.apps.golem.cloud/app-metrics/global/prometheus-metrics"

    class Handler(BaseHTTPRequestHandler):
        def log_message(self, *args): pass
        def do_GET(self):
            try:
                body = json.loads(urllib.request.urlopen(URL).read().decode())
                self.send_response(200)
                self.send_header("Content-Type", "text/plain; version=0.0.4")
                self.end_headers()
                self.wfile.write(body.encode())
            except Exception as e:
                self.send_response(500)
                self.end_headers()
                self.wfile.write(str(e).encode())

    HTTPServer(("0.0.0.0", 9090), Handler).serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metrics-proxy
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metrics-proxy
  template:
    metadata:
      labels:
        app: metrics-proxy
    spec:
      containers:
      - name: proxy
        image: python:3.12-alpine
        command: ["python3", "/app/server.py"]
        volumeMounts:
        - name: script
          mountPath: /app
        resources:
          requests:
            memory: 32Mi
            cpu: 10m
          limits:
            memory: 64Mi
      volumes:
      - name: script
        configMap:
          name: metrics-proxy
---
apiVersion: v1
kind: Service
metadata:
  name: metrics-proxy
  namespace: monitoring
spec:
  selector:
    app: metrics-proxy
  ports:
  - port: 9090
    targetPort: 9090
