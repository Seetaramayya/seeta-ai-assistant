apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: golem
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:8
        ports:
        - containerPort: 6379
        resources:
          requests:
            memory: 128Mi
            cpu: 50m
          limits:
            memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: golem
spec:
  selector:
    app: redis
  ports:
  - port: 6379
    targetPort: 6379
